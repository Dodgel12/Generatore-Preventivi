<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babbo Preventivi — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #6C63FF;
    --purple-dark: #5A52DD;
    --purple-light: #EDE9FF;
    --bg: #0F0E17;
    --surface: #1A1930;
    --surface2: #242340;
    --text: #F2F2F7;
    --text-muted: #888BAA;
    --border: rgba(108,99,255,0.2);
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(108,99,255,0.25) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(108,99,255,0.15) 0%, transparent 50%);
  }
  .login-card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(108,99,255,0.1);
  }
  .logo { text-align: center; margin-bottom: 36px; }
  .logo-icon {
    width: 64px; height: 64px; background: linear-gradient(135deg, var(--purple), #9B8FFF);
    border-radius: 18px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(108,99,255,0.4);
  }
  .logo h1 { font-size: 22px; font-weight: 800; color: var(--text); }
  .logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .form-group input {
    width: 100%; padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .form-group input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
  }
  .form-group input::placeholder { color: var(--text-muted); }
  .btn-login {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--purple), #9B8FFF);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    box-shadow: 0 8px 24px rgba(108,99,255,0.4);
    margin-top: 8px;
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(108,99,255,0.5); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .error-msg {
    background: rgba(230,76,76,0.15);
    border: 1px solid rgba(230,76,76,0.3);
    color: #FF7B7B;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    margin-top: 16px;
    display: none;
  }
  .error-msg.show { display: block; }
  .hint { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">📋</div>
    <h1>Babbo Preventivi</h1>
    <p>Gestione preventivi professionale</p>
  </div>
  <form id="login-form">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="btn-login">Accedi →</button>
    <div class="error-msg" id="error-msg"></div>
  </form>
  <div class="hint">Servizio locale • Solo rete LAN</div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('error-msg');
  btn.disabled = true;
  btn.textContent = 'Accesso...';
  errEl.classList.remove('show');

  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      window.location.href = '/';
    } else {
      errEl.textContent = data.error || 'Errore di accesso';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Accedi →';
    }
  } catch (err) {
    errEl.textContent = 'Errore di connessione al server';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Accedi →';
  }
});
</script>
</body>
</html>
